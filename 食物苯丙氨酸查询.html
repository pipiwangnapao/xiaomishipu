<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>食物苯丙氨酸查询</title>
  <style>
    :root {
      --bg: #f0f7f4;
      --header-from: #0d9488;
      --header-to: #0f766e;
      --accent: #0d9488;
      --accent-soft: rgba(13, 148, 136, 0.12);
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 16px;
      --radius-sm: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --shadow-focus: 0 0 0 4px rgba(13, 148, 136, 0.2);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      color: var(--text);
    }
    .header {
      background: linear-gradient(135deg, var(--header-from) 0%, var(--header-to) 100%);
      padding: 28px 20px 32px;
      padding-top: calc(28px + env(safe-area-inset-top));
      padding-left: calc(20px + env(safe-area-inset-left));
      padding-right: calc(20px + env(safe-area-inset-right));
      border-radius: 0 0 28px 28px;
      box-shadow: 0 8px 32px rgba(13, 148, 136, 0.25);
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 6px;
      font-size: 1.45rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
    }
    .header-title .icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.25);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    .header-sub {
      margin: 0;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.88);
      line-height: 1.45;
    }
    .field-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 18px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .field-card:focus-within {
      box-shadow: var(--shadow), var(--shadow-focus);
    }
    .field-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .field-card input.input-full {
      width: 100%;
      min-height: 48px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 16px;
      color: var(--text);
      background: #fff;
    }
    .field-card input.input-full::placeholder { color: var(--text-muted); }
    .field-card input.input-full:focus {
      outline: none;
      border-color: var(--accent);
    }
    .gram-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .gram-row input {
      width: 120px;
      min-height: 48px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 16px;
      color: var(--text);
      background: #fff;
      text-align: right;
    }
    .gram-row input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .gram-row .unit-label {
      font-size: 1rem;
      color: var(--text-muted);
    }
    .result .phe-per-100 {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 8px;
    }
    .result .phe-for-gram {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      margin-top: 4px;
    }
    .main {
      padding: 24px 20px 32px;
      padding-left: calc(20px + env(safe-area-inset-left));
      padding-right: calc(20px + env(safe-area-inset-right));
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
      margin-top: -12px;
    }
    .search-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      margin-bottom: 24px;
    }
    .search-actions button {
      flex: 1;
    }
    button {
      min-height: 48px;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--header-from), var(--header-to));
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      box-shadow: 0 2px 12px rgba(13, 148, 136, 0.35);
    }
    button:active { opacity: 0.92; transform: scale(0.98); }
    .result {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 20px 22px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--accent);
    }
    .result .name {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      font-size: 1.08rem;
      line-height: 1.4;
    }
    .result .phe {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .result .unit {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .no-data {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .ai-estimate-btn {
      display: inline-block;
      margin-top: 14px;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--header-from), var(--header-to));
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .ai-estimate-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .result .ai-note {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 10px;
      font-style: italic;
    }
    .list {
      margin-top: 16px;
      max-height: min(60vh, 400px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .list-title {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 500;
    }
    .list-item {
      min-height: 52px;
      padding: 14px 18px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      transition: background 0.2s, border-color 0.2s;
    }
    .list-item-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex: 1;
    }
    .list-item-name { font-weight: 500; }
    .list-item-gram {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
    }
    .list-item .phe {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="header-title"><span class="icon">🥗</span> 食物苯丙氨酸查询</h1>
    <p class="header-sub">输入食物名称和克数（选填），可查对应含量与每 100g 含量</p>
  </header>
  <main class="main">
    <div class="field-card">
      <label class="field-label" for="q">食物名称</label>
      <input type="text" id="q" class="input-full" placeholder="如：土豆、番茄、牛奶" autocomplete="off" inputmode="text" enterkeyhint="next" autofocus>
    </div>
    <div class="field-card">
      <label class="field-label" for="gram">克数（选填）</label>
      <div class="gram-row">
        <input type="number" id="gram" placeholder="0" min="0" step="1" inputmode="numeric" enterkeyhint="done" autocomplete="off">
        <span class="unit-label">克</span>
      </div>
    </div>
    <div class="search-actions">
      <button type="button" id="btn">查询</button>
    </div>
    <div id="out"></div>
  </main>

      function matchFood(food, keywords) {

        return false;

        if (val == null || (typeof val === "string" && val.trim() === "")) return 0;

        return (isNaN(n) || n < 0) ? 0 : n;

        else showList(list.slice(0, 50), grams);
      }

        if (e.key === "Enter") { e.preventDefault(); if (gramEl) gramEl.focus(); else search(); }
      });

    })();
